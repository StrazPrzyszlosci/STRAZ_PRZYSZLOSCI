name: D1 Database Backup

on:
  schedule:
    - cron: '0 0 * * *' # Codziennie o północy
  repository_dispatch:
    types: [trigger-backup]
  workflow_dispatch: # Możliwość ręcznego uruchomienia

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Export D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p PROJEKTY/13_baza_czesci_recykling/data/backups
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          npx wrangler d1 export fish-pond-v1 --remote --output=PROJEKTY/13_baza_czesci_recykling/data/backups/recycled_db_backup_${TIMESTAMP}.sql

      - name: Cleanup old backups (older than 90 days)
        run: |
          find PROJEKTY/13_baza_czesci_recykling/data/backups/ -name "recycled_db_backup_*.sql" -mtime +90 -delete

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PROJEKTY/13_baza_czesci_recykling/data/backups/
          git commit -m "Auto: D1 Database Backup ${TIMESTAMP}" || echo "No changes to commit"
          git push
