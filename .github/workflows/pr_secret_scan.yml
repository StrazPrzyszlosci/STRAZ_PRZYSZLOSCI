name: PR Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan diff for potential secrets
        id: scan
        run: |
          FOUND=0
          REPORT=""
          BASE="${{ steps.base.outputs.sha }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"

          git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD > changed_files.txt 2>/dev/null || true

          if [ ! -s changed_files.txt ]; then
            git diff --name-only "$BASE" "$HEAD" > changed_files.txt 2>/dev/null || echo "" > changed_files.txt
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            MATCHES=$(grep -nE \
              -e '(ghp|gho|ghu|ghs|github_pat)_[A-Za-z0-9_]{20,}' \
              -e 'AIzaSy[A-Za-z0-9_\\-]{30,}' \
              -e 'ya29\.[A-Za-z0-9_\\-]{30,}' \
              -e 'sk-[A-Za-z0-9]{20,}' \
              -e '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----' \
              -e '(password|passwd|secret|token|api_key|apikey|access_key|secret_key)\s*[:=]\s*["\x27]?[A-Za-z0-9_\\-]{8,}' \
              "$file" 2>/dev/null || true)

            if [ -n "$MATCHES" ]; then
              FOUND=1
              REPORT="${REPORT}\n--- ${file} ---\n${MATCHES}\n"
            fi
          done < changed_files.txt

          if [ "$FOUND" -eq 1 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf "POTENTIAL SECRETS DETECTED:%b\n" "$REPORT" > scan_report.txt
            cat scan_report.txt
            echo ""
            echo "::error::Potential secrets detected in PR diff. See scan report above."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No potential secrets detected in PR diff."
          fi

      - name: Comment on PR if secrets found
        if: steps.scan.outputs.found == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('scan_report.txt', 'utf8');
            const body = `## :rotating_light: Secret Scan Warning\n\nThe automated secret scan detected potential secrets in this PR.\n\n<details><summary>Scan report</summary>\n\n\`\`\`\n${report}\n\`\`\`\n\n</details>\n\n**Action required:** Remove any secrets from the diff before merging. Secrets should be set as Kaggle Secrets or GitHub Secrets, never committed to the repository.\n\nIf this is a false positive (e.g. a variable name without an actual value, or a test fixture), label the PR with \`secret-scan-false-positive\` and explain in a comment.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
